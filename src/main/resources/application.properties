server.port=8081
spring.application.name=workforce-ai-mvc-poc

# Uniform Concurrency Model (Virtual Threads)
spring.threads.virtual.enabled=true

# Plain JDBC PostgreSQL Connection Configuration (Isolated Non-Default Port)
spring.datasource.url=jdbc:postgresql://localhost:54321/wfm_db
spring.datasource.username=wfm_manager
spring.datasource.password=production_hardened_secret_2026
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Tuning for Concurrency Protections
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.pool-name=WfmHikariPool

# Spring AI Local Ollama Orchestration
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=llama3.1
spring.ai.ollama.chat.options.temperature=0.1

# Spring AI Vector Store Schema Bootstrap
spring.ai.vectorstore.pgvector.initialize-schema=true

# Resilient Apache Kafka Producer Configurations
spring.kafka.bootstrap-servers=localhost:9094
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3

# Explicitly declare Consumer configurations to unlock structural autoconfiguration loops
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.group-id=wfm-audit-group



# Lightweight Security Parameter for the SSE Entry-point
wfm.security.static-api-key=sk_wfm_poc_2026_secure_keystring
